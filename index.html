				img=document.getElementById('snap');
				img.addEventListener('click', function(event) {
				// Get the bounding box of the image (its current size)
				const rect = img.getBoundingClientRect();
			    	// Get the natural size of the image (its original size)
		       		const naturalWidth = img.naturalWidth;
			        const naturalHeight = img.naturalHeight;
	
			        // Calculate the ratio of the current size to the natural size
		        	const scaleX = naturalWidth / rect.width;
			        const scaleY = naturalHeight / rect.height;
	
				// Calculate the x and y coordinates relative to the image
				const xf = (event.clientX - rect.left) * scaleX;
				const yf = (event.clientY - rect.top) * scaleY;
				const aY = naturalHeight - yf + 0.5;	
				console.log("click");
				// Display the coordinates
				Xsend(`SUP ${Math.round(aY)}`);
				});
	
	


				firsttime=false;

				document.getElementById('vline').style.display = "none";
				//document.getElementById('hline').style.display = "none";
			}
			var OarrayLen = smsg.length;    
			dataArr = smsg.slice(3,OarrayLen);
			var CarrayLen = dataArr.length;
			dataX.length=0;
			dataY.length=0;
	    		dataX = dataArr.slice(0,CarrayLen/2);
	    		dataY = dataArr.slice(CarrayLen/2,CarrayLen);
			arrayLen = dataY.length;

				if (unitz==='eV'){

						data[0][x] = +dataX[x];

					}
				}
				if (unitz==='cm'){
					for (let x = 0; x < arrayLen; x++) {
						data[0][x] = (10000000/laser)-(10000000/dataX[x]);
						data[1][x] = dataY[x]/1000;
					}
				}
			
			
			msgtoprint=smsg[0]+" "+smsg[1]+" "+smsg[2];

	 		u.redraw((autoscale || onceauto) || firsttime);
			onceauto=false;
			firsttime=false;
		}else{msgtoprint=msg.data;}


		if((smsg[0]==="OK" || smsg[0]==="ER") && smsg.length >= 3 && smsg[1]!=="AQD" && smsg[1]!=="AQC" && smsg[1]!=="AQR") {
			for (var i=1;i<smsg.length;i+=2){

				idname1="G"+smsg[i].substring(1);

							elid1.value=parseFloat(smsg[i+1]).toFixed(1);
						}
						if (elid1.id == "GET"){

						}

				for (var j=0;j<elids.length;j++){elids[j].classList.remove('active');}
					
				elid4=document.getElementById(idname3+smsg[i+1]);

					if(eltyp3==="button"){elid3.classList.add('active');}
				}

			
			}

			switchmode();
			updatehline();

		}

		if (msg.data != ""){document.f.out.value += msgtoprint + '\n';}
	  	document.f.out.scrollTop = document.f.out.scrollHeight;
	  }

	 function send() {
		str=document.f.in.value;
	    	ws.send('' + str.toUpperCase() + '\n');
		document.f.out.value += str.toUpperCase() + '\n';
	  	document.f.out.scrollTop = document.f.out.scrollHeight;
	  	document.f.in.value='';
	  }
	 function Xsend(val) {
		const allbutts = document.querySelectorAll('button')
		for (var j=0;j<allbutts.length;j++){allbutts[j].disabled=true;}
		const allins = document.querySelectorAll('input')
		for (var j=0;j<allins.length;j++){allins[j].disabled=true;}
		document.getElementById('stat').classList.add('wow');
		document.getElementById('stat').innerHTML='BUSY';
		document.getElementById('yauto').disabled=false;
		document.getElementById('ysm').disabled=false;
		document.getElementById('eV').disabled=false;
		document.getElementById('nm').disabled=false;
		document.getElementById('cm').disabled=false;
	


		if (val==="AQC" || val==="AQR" || val==="AQD"){document.getElementById('STP').disabled=false;}
	    	ws.send(val);
		document.f.out.value += val + '\n';
	  	document.f.out.scrollTop = document.f.out.scrollHeight;
	  }
	function ysclm() {
		mx=u.scales.y.max;
		mn=u.scales.y.min;

		u.setScale('y',{min:mn,max:mn+(mx-mn)*2.0,});
		autoscale=false;
		document.getElementById('yauto').classList.remove('active');
	}
	function Xconvert(unit) {
		unitz=unit;
		
		document.getElementById('eV').classList.remove('active');
		document.getElementById('nm').classList.remove('active');
		document.getElementById('cm').classList.remove('active');
		document.getElementById(unit).classList.add('active');
		onceauto=true;

		xyscl();
	}

				if (unitz==='eV'){
